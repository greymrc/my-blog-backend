spring:
  application:
    name: myblog
  #激活配置，默认dev
  profiles:
    active: dev
  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 10MB
  # session 配置
  session:
    store-type: redis
    # 30 天过期
    timeout: 2592000
  # mysql 配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog
    username: root
    password: your_password
  # redis 配置
  data:
    redis:
      database: 1
      host: localhost
      port: 6379
      timeout: 5000
      password: 123456

server:
  port: 8894
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# Mybatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

# PageHelper 分页配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

# MinIO 对象存储配置
# todo 需替换为你的 MinIO 服务配置
minio:
  endpoint: http://localhost:9000
  accessKey: your_access_key
  secretKey: your_secret_key
  bucketName: blog

# springdoc-openapi  knife4j 配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.grey.myblog.controller
# knife 4j 的增量配置
knife4j:
  enable: true
  setting:
    language: zh_cn